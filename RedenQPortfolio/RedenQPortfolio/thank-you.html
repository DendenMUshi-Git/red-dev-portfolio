<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Thank You | Reden Quinto</title>
  
  <!-- Fonts - Same as portfolio -->
  <link rel="icon" href="../index.html/images/hacker(1).png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Icons: Font Awesome + Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <style>
    /* Same color scheme as portfolio */
    :root {
      --primary: #8B5CF6;
      --primary-dark: #7C3AED;
      --secondary: #EC4899;
      --accent: #06B6D4;
      --dark: #0F172A;
      --dark-light: #1E293B;
      --darker: #020617;
      --light: #F1F5F9;
      --text: #E2E8F0;
      --text-light: #94A3B8;
      --white: #FFFFFF;
      --gradient: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      --gradient-dark: linear-gradient(135deg, var(--dark) 0%, var(--dark-light) 100%);
      --gradient-accent: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
      --gradient-purple: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      --shadow-hover: 0 20px 50px rgba(0, 0, 0, 0.4);
      --shadow-light: 0 5px 15px rgba(0, 0, 0, 0.1);
      --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      --glass: rgba(30, 41, 59, 0.7);
      --glass-light: rgba(30, 41, 59, 0.5);
      --border: rgba(255, 255, 255, 0.1);
      --success: #10B981;
      --success-glow: 0 0 20px rgba(16, 185, 129, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--darker);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Particle Background - Same as portfolio */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--primary);
      border-radius: 50%;
      animation: float 15s infinite linear;
    }

    .particle:nth-child(odd) {
      background: var(--secondary);
    }

    .particle:nth-child(3n) {
      background: var(--accent);
    }

    @keyframes float {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) translateX(100px);
        opacity: 0;
      }
    }

    /* Animated background gradient */
    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
      z-index: 0;
      animation: gradientShift 15s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Main Container */
    .thankyou-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 600px;
      padding: 20px;
      margin: 20px;
    }

    /* Card Design - Matching resume boxes */
    .thankyou-card {
      background: var(--dark-light);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.8s ease-out;
    }

    /* Gradient border line - Same as resume boxes */
    .thankyou-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--gradient);
    }

    /* Animated glow effect */
    .thankyou-card::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
      z-index: -1;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Success Icon with animation */
    .icon-wrapper {
      width: 100px;
      height: 100px;
      margin: 0 auto 30px;
      position: relative;
    }

    .success-icon {
      width: 100%;
      height: 100%;
      background: var(--gradient);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--white);
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5);
      animation: pulseIcon 2s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    .icon-ring {
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border: 2px solid transparent;
      border-top-color: var(--primary);
      border-right-color: var(--secondary);
      border-bottom-color: var(--accent);
      border-left-color: var(--primary);
      border-radius: 50%;
      animation: spin 3s linear infinite;
    }

    .icon-ring-2 {
      position: absolute;
      top: -15px;
      left: -15px;
      right: -15px;
      bottom: -15px;
      border: 2px dotted rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      animation: spinReverse 5s linear infinite;
    }

    @keyframes pulseIcon {
      0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5); }
      50% { transform: scale(1.05); box-shadow: 0 20px 40px rgba(139, 92, 246, 0.8); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinReverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    /* Thank You Title */
    .thankyou-title {
      font-family: 'Poppins', sans-serif;
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 15px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInDown 0.8s ease-out 0.2s both;
    }

    /* Thank You Message */
    .thankyou-message {
      font-size: 1.1rem;
      color: var(--text-light);
      margin-bottom: 30px;
      line-height: 1.7;
      animation: fadeInDown 0.8s ease-out 0.3s both;
    }

    /* Highlighted text */
    .highlight {
      color: var(--primary);
      font-weight: 600;
    }

    /* Countdown Timer Section */
    .countdown-section {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .countdown-label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-light);
      margin-bottom: 15px;
    }

    .countdown-number-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .countdown-number {
      font-family: 'Poppins', sans-serif;
      font-size: 4rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      min-width: 100px;
      text-align: center;
      animation: countdownPulse 1s ease-in-out infinite;
    }

    .countdown-unit {
      font-size: 1rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @keyframes countdownPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.9; }
    }

    /* Progress Bar */
    .progress-container {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin: 20px 0 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: var(--gradient);
      animation: progressShrink 10s linear forwards;
      transform-origin: left;
    }

    @keyframes progressShrink {
      from { transform: scaleX(1); }
      to { transform: scaleX(0); }
    }

    /* Button Styles - Matching portfolio buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      outline: none;
      position: relative;
      overflow: hidden;
      z-index: 1;
      gap: 10px;
      text-decoration: none;
      min-width: 200px;
    }

    .btn-primary {
      background: var(--gradient);
      color: var(--white);
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    .btn-primary:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(139, 92, 246, 0.4);
    }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
      animation: fadeInUp 0.8s ease-out 0.7s both;
    }

    .btn-outline:hover {
      background: var(--primary);
      color: var(--white);
      transform: translateY(-5px);
    }

    .btn i {
      font-size: 1.1rem;
      transition: transform 0.3s ease;
    }

    .btn:hover i {
      transform: translateX(-5px);
    }

    /* Button Group */
    .button-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Additional Info */
    .additional-info {
      margin-top: 30px;
      font-size: 0.9rem;
      color: var(--text-light);
      animation: fadeIn 1s ease-out 0.8s both;
    }

    .additional-info i {
      color: var(--primary);
      margin: 0 5px;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .thankyou-card {
        padding: 40px 25px;
      }

      .thankyou-title {
        font-size: 2.2rem;
      }

      .countdown-number {
        font-size: 3rem;
        min-width: 80px;
      }

      .btn {
        min-width: 160px;
        padding: 12px 24px;
      }
    }

    @media (max-width: 576px) {
      .thankyou-card {
        padding: 30px 20px;
      }

      .thankyou-title {
        font-size: 1.8rem;
      }

      .thankyou-message {
        font-size: 1rem;
      }

      .countdown-number {
        font-size: 2.5rem;
        min-width: 70px;
      }

      .button-group {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 250px;
      }

      .icon-wrapper {
        width: 80px;
        height: 80px;
      }

      .success-icon {
        font-size: 2.2rem;
      }
    }

    /* Loading dots animation for countdown */
    .loading-dots {
      display: inline-block;
    }

    .loading-dots::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
      width: 0;
      display: inline-block;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    /* Smooth hover effects */
    .thankyou-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .thankyou-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }
  </style>
</head>
<body>
  <!-- Particle Background - Same as portfolio -->
  <div class="particles" id="particles"></div>
  
  <!-- Animated Gradient Background -->
  <div class="gradient-bg"></div>

  <!-- Thank You Container -->
  <div class="thankyou-container">
    <div class="thankyou-card">
      <!-- Animated Success Icon -->
      <div class="icon-wrapper">
        <div class="success-icon">
          <i class="fas fa-check"></i>
        </div>
        <div class="icon-ring"></div>
        <div class="icon-ring-2"></div>
      </div>

      <!-- Thank You Title -->
      <h1 class="thankyou-title">Thank You!</h1>
      
      <!-- Thank You Message -->
      <div class="thankyou-message">
        <p>Your message has been <span class="highlight">successfully sent</span>.</p>
        <p>I appreciate you reaching out and will get back to you as soon as possible.</p>
      </div>

      <!-- Countdown Timer Section -->
      <div class="countdown-section">
        <div class="countdown-label">
          <i class="fas fa-clock" style="margin-right: 8px;"></i>
          AUTOMATIC REDIRECT
        </div>
        
        <div class="countdown-number-wrapper">
          <span class="countdown-number" id="countdown">10</span>
          <span class="countdown-unit">seconds</span>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <div style="font-size: 0.85rem; color: var(--text-light); margin-top: 10px;">
          <i class="fas fa-arrow-right" style="margin-right: 5px;"></i>
          Redirecting to homepage automatically
        </div>
      </div>

      <!-- Button Group -->
      <div class="button-group">
        <a href="index.html" class="btn btn-primary">
          <i class="fas fa-home"></i>
          Back to Home
        </a>
        <a href="index.html#contact" class="btn btn-outline">
          <i class="fas fa-paper-plane"></i>
          Send Another
        </a>
      </div>

      <!-- Additional Info -->
      <div class="additional-info">
        <i class="fas fa-envelope-open-text"></i>
        I'll respond within 24-48 hours
        <i class="fas fa-smile-wink"></i>
      </div>
    </div>
  </div>

  <script>
    // Countdown Timer
    let timeLeft = 10; // 10 seconds
    const countdownElement = document.getElementById('countdown');
    const progressBar = document.getElementById('progressBar');

    // Create particles - Same as portfolio
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      const particleCount = 30; // Slightly fewer for this page
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        // Random position
        const left = Math.random() * 100;
        const top = Math.random() * 100;
        
        // Random size
        const size = Math.random() * 3 + 1;
        
        // Random animation delay and duration
        const delay = Math.random() * 15;
        const duration = Math.random() * 10 + 10;
        
        particle.style.left = `${left}%`;
        particle.style.top = `${top}%`;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.animationDelay = `${delay}s`;
        particle.style.animationDuration = `${duration}s`;
        
        particlesContainer.appendChild(particle);
      }
    }

    // Initialize particles
    createParticles();

    // Countdown function
    function startCountdown() {
      const timer = setInterval(() => {
        timeLeft--;
        countdownElement.textContent = timeLeft;

        // Add pulse effect when number changes
        countdownElement.style.animation = 'none';
        countdownElement.offsetHeight; // Trigger reflow
        countdownElement.style.animation = 'countdownPulse 1s ease-in-out';

        if (timeLeft <= 0) {
          clearInterval(timer);
          // Add a small delay before redirect for smooth transition
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 100);
        }
      }, 1000);
    }

    // Start countdown when page loads
    window.addEventListener('load', startCountdown);

    // Optional: Stop countdown if user interacts with page
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        // Page is hidden, you might want to pause countdown
        // But we'll let it continue running
      }
    });

    // Add smooth fade-out effect when leaving
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const href = this.getAttribute('href');
        
        // Fade out effect
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity 0.3s ease';
        
        setTimeout(() => {
          window.location.href = href;
        }, 300);
      });
    });

    // Add hover effect to countdown
    const countdownSection = document.querySelector('.countdown-section');
    countdownSection.addEventListener('mouseenter', function() {
      this.style.transform = 'scale(1.02)';
      this.style.transition = 'transform 0.3s ease';
    });

    countdownSection.addEventListener('mouseleave', function() {
      this.style.transform = 'scale(1)';
    });
  </script>

  <!-- Fallback redirect in case JavaScript fails -->
  <noscript>
    <meta http-equiv="refresh" content="10; url=index.html">
  </noscript>
</body>
</html>
